spring.application.name=careerboost

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/careerboost_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:aashii@2002}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Gemini API Key
spring.ai.google.genai.api-key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY}

# Model
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

# Temperature
spring.ai.google.genai.chat.options.temperature=0.4

# Max Output Tokens
spring.ai.google.genai.chat.options.max-output-tokens=4096