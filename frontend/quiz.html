<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>CareerBoost | Quiz</title>

    <link rel="stylesheet" href="css/quiz.css">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<div class="overlay" id="overlay"></div>

<!-- Sidebar -->

<div class="sidebar" id="sidebar">

    <div class="logo">
        CareerBoost
    </div>

    <ul> 

        <li onclick="goDashboard()">
            <i class="fas fa-home"></i>
            Dashboard
        </li>

        <li onclick="goProfile()">
            <i class="fas fa-user"></i>
            Profile
        </li>

        <li onclick="goResume()">
            <i class="fas fa-file-alt"></i>
            Resume Analysis
        </li>

        <li onclick="goJD()">
            <i class="fas fa-briefcase"></i>
            Job Match
        </li>

        <li class="active">
            <i class="fas fa-circle-question"></i>
            Quiz
        </li>

        <li onclick="goInterview()">
            <i class="fas fa-comments"></i>
            Interview
        </li>

    </ul>

    <button class="logout-btn" onclick="logout()">
        <i class="fas fa-right-from-bracket"></i>
        Logout
    </button>

</div>

<!-- Main -->

<div class="main">

    <!-- Topbar -->

    <div class="topbar">

        <button class="menu-btn" id="menuBtn">
            <i class="fas fa-bars"></i>
        </button>

        <h2>Technical Quiz</h2>

    </div>

  
    <!-- Start Section -->
  

    <div class="quiz-card" id="startSection">

        <h2>Start Practice Quiz</h2>

        <p>
            Choose your technology and difficulty level.
        </p>

        <div class="form-group">

            <label>Technology</label>

            <input type="text"
                   id="technology"
                   placeholder="Java, Spring Boot, SQL">

        </div>

        <div class="form-group">

            <label>Difficulty</label>

            <select id="difficulty">

                <option value="">Select Difficulty</option>

                <option value="Easy">Easy</option>

                <option value="Medium">Medium</option>

                <option value="Hard">Hard</option>

            </select>

        </div>

        <button
                class="start-btn"
                onclick="startQuiz()">

            Start Quiz

        </button>

    </div>


  
    <!-- Quiz Section -->
  

    <div id="quizSection" style="display:none;">

        <div class="quiz-info">

            <div class="info-card">

                <h4>Technology</h4>

                <p id="technologyName"></p>

            </div>

            <div class="info-card">

                <h4>Difficulty</h4>

                <p id="difficultyName"></p>

            </div>

            <div class="info-card">

                <h4>Total Questions</h4>

                <p id="totalQuestions"></p>

            </div>

        </div>

        <div id="questionContainer">

            <!-- Question will load here -->

        </div>

    </div>


  
    <!-- Result Section -->
  

    <div class="result-card"
         id="resultSection"
         style="display:none;">

        <h2>Quiz Result</h2>

        <div class="result-grid">

            <div class="result-box">

                <h3>Score</h3>

                <p id="score">0</p>

            </div>

            <div class="result-box">

                <h3>Correct</h3>

                <p id="correct">0</p>

            </div>

            <div class="result-box">

                <h3>Wrong</h3>

                <p id="wrong">0</p>

            </div>

            <div class="result-box">

                <h3>Percentage</h3>

                <p id="percentage">0%</p>

            </div>

        </div>

        <div class="message-box">

            <h3>Performance</h3>

            <p id="message"></p>

        </div>

        <button
                class="restart-btn"
                onclick="restartQuiz()">

            Take Another Quiz

        </button>

    </div>

</div>

<script src="js/quiz.js"></script>

</body>

</html>
