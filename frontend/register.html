<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register | CareerBoost</title>

    <link rel="stylesheet" href="css/register.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="container">

    <!-- Left Side -->

    <div class="left-panel">

        <h1>CareerBoost</h1>

        <p>
            Build your dream career with AI-powered Resume Analysis,
            Interview Preparation and Job Tracking.
        </p>


    </div>

    <!-- Right Side -->

    <div class="right-panel">

        <form id="registerForm">

            <h2>Create Account</h2>

            <p class="subtitle">
                Start your journey today 🚀
            </p>

            <!-- Full Name -->

            <div class="input-box">

                <i class="fa-solid fa-user"></i>

                <input
                    type="text"
                    id="fullName"
                    placeholder="Full Name"
                    required>

            </div>

            <!-- Email -->

            <div class="input-box">

                <i class="fa-solid fa-envelope"></i>

                <input
                    type="email"
                    id="email"
                    placeholder="Email Address"
                    required>

            </div>

            <!-- Phone -->

            <div class="input-box">

                <i class="fa-solid fa-phone"></i>

                <input
                    type="tel"
                    id="phone"
                    placeholder="Phone Number"
                    maxlength="10"
                    required>

            </div>

            <!-- Password -->

            <div class="input-box password-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

                <i class="fa-solid fa-eye togglePassword"
                   id="togglePassword"></i>

            </div>

            <!-- Confirm Password -->

            <div class="input-box password-box">

                <i class="fa-solid fa-lock"></i>

                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Confirm Password"
                    required>

                <i class="fa-solid fa-eye togglePassword"
                   id="toggleConfirmPassword"></i>

            </div>

            <!-- Terms -->

            <div class="terms">

                <input
                    type="checkbox"
                    id="terms"
                    required>

                <label for="terms">

                    I agree to the
                    <a href="#">Terms & Conditions</a>

                </label>

            </div>

            <!-- Register Button -->

            <button
                type="submit"
                class="register-btn">

                Create Account

            </button>

            <!-- Divider -->

            <div class="divider">

                <span>OR</span>

            </div>

            <!-- Google -->

            <button
                type="button"
                class="google-btn">

                <i class="fa-brands fa-google"></i>

                Continue with Google

            </button>

            <!-- Login -->

            <div class="login-link">

                Already have an account?

                <a href="index.html">

                    Login

                </a>

            </div>

        </form>

    </div>

</div>

<script src="js/register.js"></script>

</body>

</html>
