<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerBoost - Login</title>

    <link rel="stylesheet" href="css/style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="container">

    <!-- Left Side -->
    <div class="left">

        <div class="logo">
            <h1>Career<span>Boost</span></h1>
            <p>Build Skills. Crack Interviews.</p>
        </div>

        <div class="content">

            <h2>
                Interviewing: the <br>
                most profitable <br>
                skill you can learn
            </h2>

            <p>
                Practice interviews, improve your resume,
                track jobs and become industry ready.
            </p>

            <button class="learnBtn">
                Start Practicing
            </button>

        </div>

    </div>


    <!-- Right Side -->

    <div class="right">

        <div class="login-card">

            <h2>Welcome Back!</h2>

            <p>Login to continue your journey.</p>

            <form>

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                        type="email"
                        placeholder="Enter Email">

                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        placeholder="Enter Password">

                </div>

                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">Forgot Password?</a>

                </div>

                <button class="loginBtn">
                    Login
                </button>

            </form>

            <div class="divider">
                OR
            </div>

            <div class="social">

                <button>
                    <i class="fa-brands fa-google"></i>
                </button>

                <button>
                    <i class="fa-brands fa-github"></i>
                </button>

                <button>
                    <i class="fa-brands fa-linkedin"></i>
                </button>

            </div>

            <p class="register">

                Don't have an account?

                <a href="register.html">
                    Register
                </a>

            </p>

        </div>

    </div>

</div>



<script src="js/login.js"></script>

</body>
</html>
